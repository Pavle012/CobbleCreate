name: Build Modpack

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build .mrpack
        run: |
          # The .mrpack is just a zip file containing modrinth.index.json and the overrides folder
          zip -r CobbleCreate.mrpack modrinth.index.json overrides/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CobbleCreate-mrpack
          path: CobbleCreate.mrpack

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CobbleCreate.mrpack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
